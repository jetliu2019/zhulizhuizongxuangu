name: zhulizhuizongxuangu
#env:
#  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true    # 添加这一行
on:
  # 定时触发（cron使用UTC时间）
  schedule:
    # 北京时间每个工作日 11:30 运行（UTC 03:30）—— 收盘后
    #- cron: '30 3 * * 1-5'
    # 北京时间每个工作日 09:35 运行（UTC 01:35）—— 开盘后（可选）
     - cron: '35 1 * * 1-5'
  
  # 允许手动触发（方便测试）
  workflow_dispatch:

jobs:
  stock-picking:
    runs-on: ubuntu-latest
    # 设置超时时间，避免卡住浪费额度
    timeout-minutes: 240
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v5
      
      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'  # 缓存 pip 依赖，加速后续运行
      
      - name: 📦 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🕐 设置时区
        run: |
          sudo timedatectl set-timezone Asia/Shanghai
      
      - name: 📊 运行选股程序
        env:
          # 从 GitHub Secrets 中读取推送密钥
          # 至少配置一个推送渠道
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
          WECOM_KEY: ${{ secrets.WECOM_KEY }}
        run: |
          python zhulizhuizong.py
